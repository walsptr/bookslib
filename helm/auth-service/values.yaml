replicaCount: 1

image:
  repository: your-registry/auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: auth.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

secrets:
  existingSecretName: ""
  keys:
    dbDsn: DB_DSN

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

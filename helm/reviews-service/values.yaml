replicaCount: 1

image:
  repository: your-registry/reviews-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: reviews.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

db:
  name: reviews_db
  user: postgres
  host: postgres.default.svc.cluster.local

secrets:
  existingSecretName: ""
  keys:
    dbPassword: DB_PASSWORD

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
